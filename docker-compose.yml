version: "3.9"

# ─── Networks ────────────────────────────────────────────────────────────────
# All services communicate via service name over this internal bridge.
# No service is reachable from the host unless a port is explicitly published.
networks:
  pos-network:
    driver: bridge

# ─── Volumes ─────────────────────────────────────────────────────────────────
# Named volumes survive container restarts and rebuilds.
volumes:
  postgres_data:
  pgadmin_data:

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine          # pinned minor-version family; alpine = smaller attack surface
    container_name: pos_postgres
    restart: unless-stopped
    env_file: .env                     # supplies POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Bound to loopback only — prevents external connections in dev.
      # Remove this block entirely in production; the backend reaches postgres
      # via the internal pos-network without any published port.
      - "127.0.0.1:5432:5432"
    healthcheck:
      # pg_isready exits 0 only when the DB is accepting connections.
      # $$VAR syntax escapes the $ so Docker Compose doesn't interpolate it;
      # the shell inside the container expands it at runtime.
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s               # gives postgres time to initialise on first boot
    networks:
      - pos-network

  # ── Backend (Express / TypeScript) ──────────────────────────────────────────
  backend:
    container_name: pos_backend
    build:
      context: ./backend              # Dockerfile must exist at ./backend/Dockerfile
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env                    # loads JWT secrets, NODE_ENV, MPESA_*, etc.
    environment:
      # Override the localhost DATABASE_URL from .env so the backend reaches
      # postgres via the Docker internal network using the service name.
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      # Set the port the Express server listens on inside the container.
      PORT: "5000"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy    # waits until the healthcheck above passes
    networks:
      - pos-network

  # ── Frontend (React / Vite) ─────────────────────────────────────────────────
  frontend:
    container_name: pos_frontend
    build:
      context: ./frontend             # Dockerfile must exist at ./frontend/Dockerfile
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Vite exposes only VITE_* prefixed variables to the browser bundle.
      # This tells axios/fetch where to reach the backend from the browser.
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:5000}"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - pos-network

  # ── pgAdmin (DB admin UI — development only) ─────────────────────────────────
  # Remove or comment this service before deploying to production.
  pgadmin:
    image: dpage/pgadmin4
    container_name: pos_pgadmin
    restart: unless-stopped
    env_file: .env                    # supplies PGADMIN_DEFAULT_EMAIL, PGADMIN_DEFAULT_PASSWORD
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"                     # pgAdmin web UI → http://localhost:5050
    depends_on:
      - postgres
    networks:
      - pos-network

# ─── .env additions required for Docker ──────────────────────────────────────
# Append these to your .env (and .env.example) alongside the existing variables.
# Never commit real values — use a secrets manager or CI secret injection in prod.
#
# # ─── PostgreSQL (Docker) ──────────────────────────────────────────────────
# POSTGRES_USER=pos_user
# POSTGRES_PASSWORD=<generate: openssl rand -base64 32>
# POSTGRES_DB=pos_db
#
# # ─── DATABASE_URL override for Docker ─────────────────────────────────────
# # Replace the localhost URL in .env with the service-name URL below.
# # Docker Compose injects this via the environment: block above, so the
# # value in .env is only used when running outside Docker (e.g. local tsx).
# DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
#
# # ─── pgAdmin ──────────────────────────────────────────────────────────────
# PGADMIN_DEFAULT_EMAIL=admin@pos.local
# PGADMIN_DEFAULT_PASSWORD=<generate: openssl rand -base64 32>
#
# # ─── Frontend ─────────────────────────────────────────────────────────────
# VITE_API_BASE_URL=http://localhost:5000
